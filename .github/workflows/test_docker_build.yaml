name: Test Docker Build

on:
  push:
    branches:
      - main
      - test-docker
  pull_request:
    types: [labeled]

jobs:
  test:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'docker')
    name: Test Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          # `ADD . /skyportal` bakes the skyportal-data submodule into the
          # image, so its LFS payload (SFD dust maps) must be materialized here.
          lfs: true

      - name: Build Docker image
        run: |
          docker compose build

      - name: Start database
        run: docker compose up -d db

      - name: Initialize the database schema
        # The image CMD `make run_production` starts the app in production mode,
        # which by design does NOT create tables -- it expects an already-set-up
        # (migrated) database. On this fresh CI database the app workers would
        # otherwise crash-loop in refresh_enums() ("type \"spectrumtypes\" does
        # not exist") and never write .tokens.yaml. So create the schema once,
        # in a one-off container, before the web service starts.
        #
        # This is non-destructive: initial_setup.py calls baselayer's
        # create_tables() -> metadata.create_all(), which is checkfirst=True --
        # it only adds missing tables and never drops data. It does not touch
        # db_init / drop_tables, so the same command is a safe no-op against an
        # existing, populated database. This only runs in CI; the image and
        # production startup are unchanged.
        run: |
          # Wait until postgres accepts connections.
          for i in $(seq 1 30); do
            if docker compose exec -T db pg_isready -U skyportal >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker compose run --rm --no-deps web bash -c \
            'source .venv/bin/activate && PYTHONPATH=. python skyportal/initial_setup.py --config=config.yaml'

      - name: Start web service
        run: docker compose up -d web

      - name: Wait for web service to be healthy
        # The old `sleep 30 + ps grep` only proved the container hadn't crashed,
        # not that the tornado app had finished booting. With the new (heavier)
        # sncosmo warm-up and the dustmap fetch firing during model import,
        # `.tokens.yaml` can be written well after 30 s — by then the data_loader
        # has already burned its 50 × 5 s retry budget waiting for a token that
        # didn't exist yet. Poll the app port directly until it responds.
        run: |
          for i in $(seq 1 60); do
            if ! docker compose ps --services --filter "status=running" | grep -q "web"; then
              echo "Web container is not running. Logs:"
              docker compose logs web
              exit 1
            fi
            if docker exec skyportal-web-1 bash -c 'test -f .tokens.yaml && grep -q INITIAL_ADMIN .tokens.yaml' 2>/dev/null; then
              echo "App is up; .tokens.yaml present after ${i}0 s."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for .tokens.yaml. Web logs:"
              docker compose logs web
              exit 1
            fi
            sleep 10
          done

      - name: Test loading demo data
        run: |
          docker exec skyportal-web-1 bash -c 'source .venv/bin/activate && FLAGS="--create_tables --config=config.yaml" make load_demo_data'

      - name: Dump web container logs on failure
        if: failure()
        run: docker compose logs web
