name: Test Docker Build

on:
  push:
    branches:
      - main
      - test-docker
  pull_request:
    types: [labeled]

jobs:
  test:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'docker')
    name: Test Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Build Docker image
        run: |
          docker compose build

      - name: Start containers
        run: |
          docker compose up -d

      - name: Wait for web service to be healthy
        run: |
          sleep 30
          if ! docker compose ps --services --filter "status=running" | grep -q "web"; then
            echo "Web service is not running. Logs:"
            docker compose logs web
            exit 1
          fi

      - name: Test loading demo data
        run: |
          docker exec skyportal-web-1 bash -c 'source .venv/bin/activate && FLAGS="--create_tables --config=config.yaml" make load_demo_data'
