name: Model Logic

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  # Cancel superseded runs on PRs, but let main runs finish (per-commit status).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test-models:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # The model/permission suite (skyportal/tests/models) is a single
    # data-driven, parametrized test file. Shard it across parallel jobs via
    # PERM_SHARD="<shard>/<N_SHARDS>" so each stays well under the time budget.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    env:
      N_SHARDS: 6

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: skyportal
          POSTGRES_PASSWORD: anything
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a
        # healthcheck
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          # Pull the skyportal-data submodule's LFS payload (SFD dust maps);
          # bandpasses are plain git and come down with the submodule itself.
          lfs: true

      - name: Cache dependencies
        uses: ./.github/actions/cache-dependencies

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Write SkyPortal configs
        run: |
          cat << EOF > config.yaml
            database:
              database: skyportal
              host: localhost
              port: 5432
              user: skyportal
              password: anything
          EOF

          cat << EOF > test_config.yaml
            database:
              database: skyportal_test
              user: skyportal
              host: localhost
              port: 5432
              password: anything

            server:
              auth:
                debug_login: True

            # Same SEDM short-circuit as the repo's test_config.yaml — we
            # overwrite that file with this heredoc, so the override has to
            # be repeated here or the demo loader's followup_request POSTs
            # will fall through to the live STScI endpoint and time out.
            app:
              sedm_endpoint:
          EOF

      - name: Install system dependencies
        run: |
          sudo apt update -y
          sudo apt install -y wget unzip nginx libcurl4-gnutls-dev libgnutls28-dev

          export NPM_PACKAGES="${HOME}/.npm-packages"
          export PATH=${NPM_PACKAGES}/bin:$PATH
          export NODE_PATH="$NPM_PACKAGES/lib/node_modules:$NODE_PATH"

          which python; python --version
          echo bun $(bun --version)
          echo node $(node --version)
          nginx -v

      - name: Initialize SkyPortal
        run: |
          # Usually, we create databases on the local machine, so
          # `createdb` just works out of the box.  However, when doing
          # this on a server, as in our case, we need to specify extra
          # options.
          #
          # db_init should not complain if the databases exist already
          #
          echo "localhost:5432:*:skyportal:anything" > ~/.pgpass
          chmod 600 ~/.pgpass

          createdb -h localhost -U skyportal skyportal_test
          psql -U skyportal -h localhost -c "GRANT ALL PRIVILEGES ON DATABASE skyportal_test TO skyportal;" skyportal_test

          export NPM_CONFIG_LEGACY_PEER_DEPS="true"
          uv sync --inexact --group dev
          make db_init

          bun pm ls || true

      - name: Refresh SkyPortal dependencies for tested version
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          export NPM_CONFIG_LEGACY_PEER_DEPS="true"
          make dependencies

      # Lint the diff once (on shard 0), not once per shard.
      - name: Formatting and linting checks
        if: matrix.shard == 0 && github.ref != 'refs/heads/main'
        run: |
          uvx pre-commit run --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}

      - name: Save dependency caches
        if: matrix.shard == 0
        uses: ./.github/actions/cache-dependencies-save

      # The model/permission tests build their own fixtures, so they don't need
      # the demo-data load (that smoke test still runs in test_migrations.yaml).
      # Each job runs only its PERM_SHARD slice of the parametrized CASES.
      - name: Run model/permission tests (shard ${{ matrix.shard }}/${{ env.N_SHARDS }})
        run: |
          source .venv/bin/activate
          PERM_SHARD="${{ matrix.shard }}/${{ env.N_SHARDS }}" PYTHONPATH=. \
            python baselayer/tools/test_frontend.py --xml 'skyportal/tests/models'

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: logs-model-logic-${{ matrix.shard }}
          path: log

      - name: Upload test post-mortem reports
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: test-results-model-logic-${{ matrix.shard }}
          path: test-results
