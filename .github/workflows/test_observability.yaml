name: Observability Kit

on:
  push:
    branches:
      - main
    paths:
      - "observability/**"
      - ".github/workflows/test_observability.yaml"
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "observability/**"
      - ".github/workflows/test_observability.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  # Cancel superseded runs on PRs, but let main runs finish (per-commit status).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  smoke-test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Stands up the real prometheus.yml + Grafana provisioning + dashboard
      # against a metrics stub and asserts the pipeline works end to end.
      - name: Observability smoke test
        run: bash observability/tests/run.sh
