name: API & frontend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  # Cancel superseded runs on PRs, but let main runs finish (per-commit status).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FRONTEND_TEST_HEADLESS: "1"
  # The 2-vCPU runner renders pages more slowly under load than a dev machine, so
  # give Playwright's default action/expect wait more headroom (locally it stays
  # at the 30s default). Resolves as soon as the element is ready, so this only
  # affects the worst-case waits.
  PLAYWRIGHT_DEFAULT_TIMEOUT_MS: "90000"

jobs:
  test-api-and-frontend:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: skyportal
          POSTGRES_PASSWORD: anything
          # Trust host connections too (already trust for local): the connection
          # pooling test runs pgbouncer against this DB, and pgbouncer has no
          # PGPASSWORD fallback like psycopg does.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a
        # healthcheck
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        test_subset:
          [
            "api_and_utils_pt1",
            "api_and_utils_pt2",
            "api_and_utils_pt3",
            "api_and_utils_pt4",
            "frontend_pt1",
            "frontend_pt2",
            "frontend_pt3",
            "frontend_pt4",
            "frontend_pt5",
            "frontend_pt6",
            "external_pt1",
            "external_pt2",
          ]

    steps:
      - name: Checkout branch being tested
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          clean: false
          # Pull the skyportal-data submodule's LFS payload (SFD dust maps);
          # bandpasses are plain git and come down with the submodule itself.
          lfs: true

      - name: Cache dependencies
        uses: ./.github/actions/cache-dependencies

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Write SkyPortal configs
        run: |
          cat << EOF > config.yaml
            database:
              database: skyportal
              host: localhost
              port: 5432
              user: skyportal
              password: anything
          EOF

      - name: Install system dependencies
        run: |
          sudo apt update -y
          sudo apt install -y wget unzip libcurl4-gnutls-dev libgnutls28-dev nginx pgbouncer

          export NPM_PACKAGES="${HOME}/.npm-packages"
          export PATH=${NPM_PACKAGES}/bin:$PATH
          export NODE_PATH="$NPM_PACKAGES/lib/node_modules:$NODE_PATH"

          which python; python --version
          echo bun $(bun --version)
          echo node $(node --version)
          nginx -v

      - name: Initialize SkyPortal
        run: |
          # Usually, we create databases on the local machine, so
          # `createdb` just works out of the box.  However, when doing
          # this on a server, as in our case, we need to specify extra
          # options.
          #
          # db_init should not complain if the databases exist already
          #
          echo "localhost:5432:*:skyportal:anything" > ~/.pgpass
          chmod 600 ~/.pgpass

          createdb -h localhost -U skyportal skyportal_test
          psql -U skyportal -h localhost -c "GRANT ALL PRIVILEGES ON DATABASE skyportal_test TO skyportal;" skyportal_test

          # Install dependencies, and initialize the database
          uv sync --inexact --group dev

          # Install the Playwright-managed Firefox build (+ its system deps)
          # used by the frontend `page` fixture.
          .venv/bin/playwright install --with-deps firefox

          make db_init

          bun pm ls || true

          # Stamp Alembic HEAD
          PYTHONPATH=. .venv/bin/python -m alembic -x config=config.yaml stamp head

      - name: Formatting and linting checks
        if: github.ref != 'refs/heads/main'
        run: |
          uvx pre-commit run --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}

      - name: Patch test_frontend.py for a longer timeout
        run: |
          sed -i 's/timeout=60/timeout=180/g' baselayer/tools/test_frontend.py

      - name: Patch Notifications.jsx for a longer display
        run: |
          sed -i 's/duration = 3000/duration = 15000/g' baselayer/static/js/components/Notifications.jsx

      - name: Patch nginx proxy_read_timeout for CI server load
        run: |
          # The CI runner has only 2 vCPUs shared by Postgres, the app processes,
          # the microservices and Firefox, so heavy (but progressing) requests can
          # take >60s and return a 504. Give the upstream more headroom.
          sed -i 's/proxy_read_timeout 60s/proxy_read_timeout 120s/g' baselayer/services/nginx/nginx.conf.template

      - name: Build the test frontend bundle in production mode
        run: |
          # The rspack service builds a dev bundle in debug mode (which the test
          # harness uses): ~4-5x larger and slower to parse+execute, which makes
          # the Playwright frontend tests far more prone to timing races. Build
          # production like the Docker image does (keep --watch so the supervisor
          # service stays up).
          sed -i 's/"npx", "rspack", "--watch"/"npx", "rspack", "--mode=production", "--watch"/' baselayer/services/rspack/rspack.py

      - name: Save dependency caches
        uses: ./.github/actions/cache-dependencies-save

      # Per-folder microservice trim: each frontend folder only exercises a
      # subset of the queues, so disable the unused ones to free CPU/RAM on the
      # 2-vCPU runner. analysis services -> only data_products_and_analysis (pt6);
      # observation_plan_queue/facility_queue -> only the GCN/follow-up (pt2) and
      # observation (pt5) folders; notification_queue -> only the source- and
      # notification-test folders (pt1, pt5). (gcn_service is off everywhere.)
      - name: Trim unused microservices for this frontend subset
        if: ${{ startsWith(matrix.test_subset, 'frontend_') }}
        env:
          TEST_SUBSET: ${{ matrix.test_subset }}
        run: |
          python3 - <<'PY'
          import os

          EXTRA = {
              "frontend_pt1": ["sn_analysis_service", "openai_analysis_service", "observation_plan_queue"],
              "frontend_pt2": ["sn_analysis_service", "openai_analysis_service"],
              "frontend_pt3": ["sn_analysis_service", "openai_analysis_service", "observation_plan_queue", "facility_queue", "notification_queue"],
              "frontend_pt4": ["sn_analysis_service", "openai_analysis_service", "observation_plan_queue", "facility_queue", "notification_queue"],
              "frontend_pt5": ["sn_analysis_service", "openai_analysis_service"],
              "frontend_pt6": ["observation_plan_queue", "facility_queue", "notification_queue"],
          }
          extra = EXTRA.get(os.environ["TEST_SUBSET"], [])
          if extra:
              with open("test_config.yaml") as f:
                  lines = f.readlines()
              out = []
              for line in lines:
                  out.append(line)
                  if line.rstrip() == "  disabled:":
                      out += [f"    - {s}\n" for s in extra]
              with open("test_config.yaml", "w") as f:
                  f.writelines(out)
              print(f"Disabled for {os.environ['TEST_SUBSET']}: {extra}")
          PY

      # The frontend suite is split across six sibling folders (one matrix job
      # each) to keep per-runner load down on the 2-vCPU runners. New test files
      # just go in the relevant folder.
      - name: Run front-end tests part 1 (sources & observing runs)
        if: ${{ matrix.test_subset == 'frontend_pt1' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/sources_and_observingruns_etc'

      - name: Run front-end tests part 2 (GCN, observation plans & follow-up)
        if: ${{ matrix.test_subset == 'frontend_pt2' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/gcn_observations_and_followup'

      - name: Run front-end tests part 3 (users, groups & account)
        if: ${{ matrix.test_subset == 'frontend_pt3' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/users_groups_and_content'

      - name: Run front-end tests part 4 (sources, candidates & classification)
        if: ${{ matrix.test_subset == 'frontend_pt4' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/sources_data_and_analysis'

      - name: Run front-end tests part 5 (observations & instruments)
        if: ${{ matrix.test_subset == 'frontend_pt5' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/observations_and_instruments'

      - name: Run front-end tests part 6 (data products & analysis)
        if: ${{ matrix.test_subset == 'frontend_pt6' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/data_products_and_analysis'

      - name: Run API & utils tests part 1 (sources & candidates)
        if: ${{ matrix.test_subset == 'api_and_utils_pt1' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/api_tests/sources_candidates'

      - name: Run API & utils tests part 2 (photometry & follow-up)
        if: ${{ matrix.test_subset == 'api_and_utils_pt2' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/api_tests/photometry_followup'

      - name: Run API & utils tests part 3 (groups, users & analysis)
        if: ${{ matrix.test_subset == 'api_and_utils_pt3' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/api_tests/groups_users_analysis'

      - name: Run API & utils tests part 4 (spectra, utils & misc)
        if: ${{ matrix.test_subset == 'api_and_utils_pt4' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/api_tests/spectra_misc skyportal/tests/tools skyportal/tests/utils skyportal/tests/rate_limiting'

      - name: Run external tests part 1 (followup requests)
        if: ${{ matrix.test_subset == 'external_pt1' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/external/test_followup_requests.py'

      - name: Run external tests part 2 (services & moving objects)
        if: ${{ matrix.test_subset == 'external_pt2' }}
        continue-on-error: true
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml '--ignore=skyportal/tests/external/test_followup_requests.py skyportal/tests/external'

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: logs-${{ matrix.test_subset }}
          path: log

      - name: Upload test post-mortem reports
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: test-results-${{ matrix.test_subset }}
          path: test-results

      - name: Upload generated plots
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: generated-plots-${{ matrix.test_subset }}
          path: skyportal/tests/data/*_expected.png
