name: API & frontend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  # Cancel superseded runs on PRs, but let main runs finish (per-commit status).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FRONTEND_TEST_HEADLESS: "1"
  # The 2-vCPU runner renders pages more slowly under load than a dev machine, so
  # give Playwright's default action/expect wait more headroom (locally it stays
  # at the 30s default). Resolves as soon as the element is ready, so this only
  # affects the worst-case waits.
  PLAYWRIGHT_DEFAULT_TIMEOUT_MS: "60000"

jobs:
  test-api-and-frontend:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: skyportal
          POSTGRES_PASSWORD: anything
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a
        # healthcheck
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        test_subset:
          [
            "api_and_utils_pt1",
            "api_and_utils_pt2",
            "frontend_pt1",
            "frontend_pt2",
            "frontend_pt3",
            "frontend_pt4",
            "external",
          ]

    steps:
      - name: Checkout branch being tested
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          clean: false
          # Pull the skyportal-data submodule's LFS payload (SFD dust maps);
          # bandpasses are plain git and come down with the submodule itself.
          lfs: true

      - name: Cache dependencies
        uses: ./.github/actions/cache-dependencies

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Write SkyPortal configs
        run: |
          cat << EOF > config.yaml
            database:
              database: skyportal
              host: localhost
              port: 5432
              user: skyportal
              password: anything
          EOF

      - name: Install system dependencies
        run: |
          sudo apt update -y
          sudo apt install -y wget unzip libcurl4-gnutls-dev libgnutls28-dev nginx

          export NPM_PACKAGES="${HOME}/.npm-packages"
          export PATH=${NPM_PACKAGES}/bin:$PATH
          export NODE_PATH="$NPM_PACKAGES/lib/node_modules:$NODE_PATH"

          which python; python --version
          echo bun $(bun --version)
          echo node $(node --version)
          nginx -v

      - name: Initialize SkyPortal
        run: |
          # Usually, we create databases on the local machine, so
          # `createdb` just works out of the box.  However, when doing
          # this on a server, as in our case, we need to specify extra
          # options.
          #
          # db_init should not complain if the databases exist already
          #
          echo "localhost:5432:*:skyportal:anything" > ~/.pgpass
          chmod 600 ~/.pgpass

          createdb -h localhost -U skyportal skyportal_test
          psql -U skyportal -h localhost -c "GRANT ALL PRIVILEGES ON DATABASE skyportal_test TO skyportal;" skyportal_test

          export NPM_CONFIG_LEGACY_PEER_DEPS="true"

          # Install dependencies, and initialize the database
          uv sync --inexact --group dev

          # Install the Playwright-managed Firefox build (+ its system deps)
          # used by the frontend `page` fixture.
          .venv/bin/playwright install --with-deps firefox

          make db_init

          bun pm ls || true

          # Stamp Alembic HEAD
          PYTHONPATH=. .venv/bin/python -m alembic -x config=config.yaml stamp head

      - name: Formatting and linting checks
        if: github.ref != 'refs/heads/main'
        run: |
          uvx pre-commit run --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}

      - name: Patch test_frontend.py for a longer timeout
        run: |
          sed -i 's/timeout=60/timeout=180/g' baselayer/tools/test_frontend.py

      - name: Patch Notifications.jsx for a longer display
        run: |
          sed -i 's/duration = 3000/duration = 15000/g' baselayer/static/js/components/Notifications.jsx

      - name: Patch nginx proxy_read_timeout for CI server load
        run: |
          # The CI runner has only 2 vCPUs shared by Postgres, the app processes,
          # the microservices and Firefox, so heavy (but progressing) requests can
          # take >60s and return a 504. Give the upstream more headroom.
          sed -i 's/proxy_read_timeout 60s/proxy_read_timeout 120s/g' baselayer/services/nginx/nginx.conf.template

      - name: Save dependency caches
        uses: ./.github/actions/cache-dependencies-save

      # The frontend suite is split across four sibling folders (one matrix job
      # each) to keep per-runner load down on the 2-vCPU runners:
      # sources_and_observingruns_etc (pt1), gcn_observations_and_followup (pt2,
      # the heavy GCN/observation/follow-up tests), users_groups_and_content (pt3,
      # users/groups/account/admin), and sources_data_and_analysis (pt4, sources/
      # data-products/analysis). New test files just go in the relevant folder.
      - name: Run front-end tests part 1 (sources & observing runs)
        if: ${{ matrix.test_subset == 'frontend_pt1' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/sources_and_observingruns_etc'

      - name: Run front-end tests part 2 (GCN, observations & follow-up)
        if: ${{ matrix.test_subset == 'frontend_pt2' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/gcn_observations_and_followup'

      - name: Run front-end tests part 3 (users, groups & account)
        if: ${{ matrix.test_subset == 'frontend_pt3' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/users_groups_and_content'

      - name: Run front-end tests part 4 (sources, data & analysis)
        if: ${{ matrix.test_subset == 'frontend_pt4' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/frontend/sources_data_and_analysis'

      - name: Run API & utils tests part 1
        if: ${{ matrix.test_subset == 'api_and_utils_pt1' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/api_tests/candidates_sources_events'

      - name: Run API & utils tests part 2
        if: ${{ matrix.test_subset == 'api_and_utils_pt2' }}
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml '--ignore=skyportal/tests/api_tests/candidates_sources_events skyportal/tests/api_tests skyportal/tests/tools skyportal/tests/utils skyportal/tests/rate_limiting'

      - name: Run external tests
        if: ${{ matrix.test_subset == 'external' }}
        continue-on-error: true
        run: |
          source .venv/bin/activate && PYTHONPATH=. python baselayer/tools/test_frontend.py --xml 'skyportal/tests/external'

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: logs-${{ matrix.test_subset }}
          path: log

      - name: Upload test post-mortem reports
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: test-results-${{ matrix.test_subset }}
          path: test-results

      - name: Upload generated plots
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: generated-plots-${{ matrix.test_subset }}
          path: skyportal/tests/data/*_expected.png
