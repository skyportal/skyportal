name: Reusable Cache Workflow

on:
  workflow_call:

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
            ${{ runner.os }}-pnpm-

      # caching dustmap & sncosmo files is dependent on their corresponding
      # python package versions, so we use that as the cache key
      - uses: actions/cache@v5
        with:
          path: |
            persistentdata/dustmap/sfd
          key: ${{ runner.os }}-dustmap-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-dustmap-${{ hashFiles('uv.lock') }}
            ${{ runner.os }}-dustmap-

      - uses: actions/cache@v5
        with:
          path: |
            ~/.astropy/cache/sncosmo/bandpasses
          key: ${{ runner.os }}-sncosmo-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-sncosmo-${{ hashFiles('uv.lock') }}
            ${{ runner.os }}-sncosmo-
