    "responses==0.25.8",
    "twilio==9.10.0",
    "numba>=0.59.0",
    "pyvo==1.8",
    "lxml==6.0.2",
    "suds-py3==1.4.5.0",
    "vcrpy==8.1.1",
    "aiosmtpd==1.4.6",
    "ligo.skymap==2.0.1",
    "python-ligo-lw==1.8.4",
    "lalsuite<7.27",
    "healpy==1.18.1",
    "pygcn==1.1.2",
    "pysedm==0.41.0",
    "xmlschema==4.1.0",
    "requests>=2.30.0, <3.0.0",
    "geojson==3.2.0",
    "typing-extensions==4.15.0",
    "swifttools==3.0.23",
    "gwemopt==0.3.6",
    "humanize==4.14.0",
    "xarray>=21.1",
    "simsurvey==0.7.5",
    "noaodatalab==2.20.0",
