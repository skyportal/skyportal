    "joblib>=1.5.0, <2.0.0",
    "seaborn>=0.13.2, <1.0.0",
    "factory-boy==3.3.3",
    "astropy==6.1.4",
    "distributed>=2024.5.2",
    "dust_extinction==1.6",
    "dustmaps==1.0.13",
    "reproject==0.14.1",
    "avro-python3==1.10.2",
    "fastavro>=1.9.4,<2.0.0",
    "tqdm>=4.27,<4.68",
    "matplotlib>=3.6.2, <3.8.0",
    "astroquery==0.4.11",
    "apispec>=6.3.0, <7.0.0",
    "marshmallow==3.26.2",
    "marshmallow-sqlalchemy==1.1.0",
    "marshmallow-enum==1.5.1",
    "Pillow>=8.4.0",
    "pyproj==3.7.0",
    "sncosmo==2.11.1",
    "tdtax==0.1.7",
    "healpix-alchemy==1.1.0",
    "mocpy==0.18.0",
    "obspy==1.4.0",
    "conesearch-alchemy==1.1.0",
    "regions==0.10",
    "jsonschema==4.23.0",
    "jsonpath_ng==1.7.0",
    "tables>=3.10.1,<4.0.0",
    "timezonefinder==8.2.0",
    "astroplan==0.10.1",
    "email-validator==2.3.0",
    "alembic==1.18.3",
    "marshmallow-jsonschema==0.13.0",
    "paramiko==4.0.0",
    "scp==0.15.0",
    "requests_toolbelt==1.0.0",
