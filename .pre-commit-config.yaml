default_language_version:
  python: python3
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 3b3f7c3f57fe9925356faf5fe6230835138be230 # frozen: v0.15.17
    hooks:
      - id: ruff
        args: ["--fix", "--show-fixes", "--exit-non-zero-on-fix"]
        exclude: baselayer|node_modules|static|data
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0 # Use the sha or tag you want to point at
    hooks:
      - id: prettier
        pass_filenames: true
        exclude: baselayer|node_modules|doc|data|bun\.lock|static/js/types/api\.ts|static/js/types/routeSchemaMap\.ts|^(.*_template\.html)$
        args: [--prose-wrap=preserve]
        additional_dependencies:
          - prettier@3.8.3
  - repo: local
    hooks:
      - id: ESLint
        name: ESLint
        entry: bun x eslint -c eslint.config.js --fix
        language: system
        files: static/.*\.[jt]sx?$
        types: [file]
