services:
  web:
    build: .
    ports:
      - "9000:5000"
      - "9001:5001"
    volumes:
      # allow the data files to be mounted across containers
      # if need be with the :z flag
      # cf. https://stackoverflow.com/a/35222815
      - thumbnails:/skyportal/static/thumbnails:z
      - persistentdata:/skyportal/persistentdata:z
    depends_on:
      db-init:
        condition: service_completed_successfully

  # run_production does not create tables, so initialize the schema before the
  # app starts. create_all() is checkfirst=True, so this is a safe no-op against
  # an already-populated database.
  db-init:
    build: .
    command:
      ["bash", "-c", "source .venv/bin/activate && PYTHONPATH=. python skyportal/initial_setup.py --config=config.yaml"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    container_name: postgres17
    environment:
      POSTGRES_USER: skyportal
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skyportal
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/dbdata:/var/lib/postgresql/data:z
    restart: on-failure:3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyportal -d skyportal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Valkey, configured to match BOOM's (same image + dev settings) since both
  # talk to the redis protocol. Backs skyportal.utils.valkey_cache.
  valkey:
    image: valkey/valkey:7.2.6
    container_name: valkey
    ports:
      - "6379:6379"
    environment:
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes
      - VALKEY_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    volumes:
      - valkeydata:/data
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  dbdata:
  valkeydata:
  thumbnails:
  persistentdata:
